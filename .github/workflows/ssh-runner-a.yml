name: SSH Runner A

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: "Tailscale Auth Key (залишити пустим, якщо використовується секрет)"
        required: false
      username:
        description: "SSH username"
        required: false
        default: runner
      password:
        description: "SSH password"
        required: false
        default: runner
      cycles:
        description: "Скільки разів перезапускати (9999 = майже вічно)"
        required: false
        default: "9999"

permissions:
  contents: read
  actions: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Set environment from input or secret
        run: |
          USERNAME="${{ github.event.inputs.username }}"
          PASSWORD="${{ github.event.inputs.password }}"
          TAILSCALE_AUTHKEY="${{ github.event.inputs.ts_authkey }}"
          
          # Використовуємо секрет, якщо ключ не введено
          if [ -z "$TAILSCALE_AUTHKEY" ]; then
            TAILSCALE_AUTHKEY="${{ secrets.TAILSCALE_AUTHKEY }}"
          fi
          
          echo "USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "TAILSCALE_AUTHKEY=$TAILSCALE_AUTHKEY" >> $GITHUB_ENV

      - name: Setup SSH user
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${USERNAME}

          sudo apt-get update -qq
          sudo apt-get install -y openssh-server
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "ssh-a-${{ github.run_id }}"

      - name: Show connection info
        run: |
          IP=$(tailscale ip -4 | head -n1)
          echo "SSH: ssh ${USERNAME}@${IP}"

      - name: Keep alive
        run: sleep 20000

      - name: Dispatch B
        if: always()
        run: |
          cycles=${{ github.event.inputs.cycles }}
          next=$((cycles-1))
          if [ "$next" -gt 0 ]; then
            curl -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/ssh-runner-b.yml/dispatches \
              -d "{\"ref\":\"main\",\"inputs\":{
                     \"ts_authkey\":\"${TAILSCALE_AUTHKEY}\",
                     \"username\":\"${USERNAME}\",
                     \"password\":\"${PASSWORD}\",
                     \"cycles\":\"$next\"}}"
          fi
