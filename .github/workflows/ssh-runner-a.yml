name: RDP + Tailscale + RustDesk + (Optional) Chrome Remote Desktop (A)

on:
  workflow_dispatch:
    inputs:
      ts_tailnet: { description: "Tailscale tailnet", required: true }
      ts_api_key: { description: "Tailscale API key", required: true }
      ts_authkey: { description: "Tailscale AuthKey (first time only)", required: false, default: "" }
      quick_test: { description: "Run 5-min test", type: boolean, default: false }
      runtime_minutes: { description: "Runtime", required: false, default: "355" }
      cycles: { description: "0=stop after this run; N=handoffs left", required: false, default: "0" }

permissions:
  contents: read
  actions: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      multi: ${{ steps.mk.outputs.multi }}

    steps:
      - id: mk
        run: |
          $n = 1
          $inc = @(); for ($i=1; $i -le $n; $i++){ $inc += @{ id = $i } }
          $json = @{ include = $inc } | ConvertTo-Json -Compress
          "matrix=$json" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "multi=0" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

  rdp:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 1
    env:
      RDP_USER: Bullettemporary
      RDP_PASS: Bullet@12345
      TAILSCALE_HOSTNAME: bullet-${{ matrix.id }}

    steps:
      - name: Install Tailscale & Connect
        run: |
          $stateFile = "C:\ProgramData\Tailscale\tailscaled.state"
          $tsExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsExe)) {
            Invoke-WebRequest https://tailscale.com/install.ps1 -OutFile "$env:TEMP\install-ts.ps1"
            powershell -ExecutionPolicy Bypass -File "$env:TEMP\install-ts.ps1"
          }

          if (-not (Test-Path $stateFile) -and "${{ inputs.ts_authkey }}" -ne "") {
            & $tsExe up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TAILSCALE_HOSTNAME"
          } else {
            & $tsExe up --hostname "$env:TAILSCALE_HOSTNAME"
          }

          $ip4 = & $tsExe ip -4 | Select-Object -First 1
          "TAILSCALE_IP=$ip4" | Out-File -Append $env:GITHUB_ENV

      - name: Enable RDP
        run: |
          $u=$env:RDP_USER; $p=$env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Dispatch next workflow B
        if: ${{ inputs.cycles }} -gt 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $next = [int]${{ inputs.cycles }} - 1
          $payload = @{
            ts_tailnet      = "${{ inputs.ts_tailnet }}"
            ts_api_key      = "${{ inputs.ts_api_key }}"
            ts_authkey      = ""  # AuthKey не передається далі
            quick_test      = "${{ inputs.quick_test }}"
            runtime_minutes = "${{ inputs.runtime_minutes }}"
            cycles          = "$next"
          }
          $url = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-B.yml/dispatches"
          $body = @{ ref="${{ github.ref_name }}"; inputs=$payload } | ConvertTo-Json -Depth 20
          Invoke-RestMethod -Method POST -Uri $url -Headers @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github+json" } -Body $body
