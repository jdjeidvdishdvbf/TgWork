name: SSH Runner + Tailscale (B)

on:
  workflow_dispatch:
    inputs:
      ts_authkey: { description: "Tailscale AuthKey (only used first time)", required: true }
      cycles: { description: "Number of handoffs (0=stop after this)", required: false, default: "999" }

jobs:
  ssh-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh

      - name: Start Tailscale (only first run with authkey)
        run: |
          STATE="/var/lib/tailscale/tailscaled.state"
          if [ ! -f "$STATE" ]; then
            echo "First time: using AuthKey"
            sudo tailscale up --authkey "${{ github.event.inputs.ts_authkey }}" --hostname "runner-B"
          else
            echo "Already authorized: just up"
            sudo tailscale up --hostname "runner-B"
          fi
          echo "Tailscale IP: $(tailscale ip -4 | head -n1)"

      - name: Keep alive
        run: |
          while true; do
            echo "Runner-B heartbeat $(date)"
            sleep 60
          done

      - name: Dispatch next A
        if: ${{ github.event.inputs.cycles != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT=$(( ${{ github.event.inputs.cycles }} - 1 ))
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/tailscale-cycle-A.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"ts_authkey\":\"${{ github.event.inputs.ts_authkey}}\",\"cycles\":\"$NEXT\"}}"
