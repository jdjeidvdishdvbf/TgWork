name: SSH Runner B

on:
  workflow_dispatch:
    inputs:
      cycles:
        required: false
        default: "9999"

permissions:
  contents: read
  actions: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      USERNAME: runner
      PASSWORD: runner
      TG_TOKEN: "7361353728:AAHbzfLNjuG8zxatvkCrhVGKWi3MrcTOg-g"
      TG_CHAT_ID: "1047092792"

    steps:
      - name: Setup SSH
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          sudo apt-get update -qq
          sudo apt-get install -y openssh-server python3 python3-pip curl
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "ssh-b-${{ github.run_id }}"

      - name: Send Telegram Bot Ping
        run: |
          IP=$(tailscale ip -4 | head -n1)
          echo "
import time
import os
import requests

TOKEN = '${TG_TOKEN}'
CHAT_ID = '${TG_CHAT_ID}'

def send_message(text):
    url = f'https://api.telegram.org/bot{TOKEN}/sendMessage'
    requests.post(url, data={'chat_id': CHAT_ID, 'text': text})

send_message('SSH Runner B запущено! SSH: ${USERNAME}@${IP}')

while True:
    ping = os.popen('ping -c 1 google.com').read()
    send_message(f'Ping:\\n{ping}')
    time.sleep(30)
" > tg_ping_b.py

      - name: Run Telegram Bot
        run: python3 tg_ping_b.py &

      - name: Keep alive
        run: sleep 20000

      - name: Restart A
        if: always()
        run: |
          cycles=${{ inputs.cycles }}
          next=$((cycles-1))
          curl -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/ssh-runner-a.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"cycles\":\"$next\"}}"
