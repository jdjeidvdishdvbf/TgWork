name: SSH Runner + Tailscale (B)

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: "Tailscale Auth Key"
        required: true
      username:
        description: "SSH username"
        required: true
        default: runner
      password:
        description: "SSH password"
        required: true
        default: runner
      cycles:
        description: "Number of handoffs (0 = stop)"
        required: false
        default: "0"

permissions:
  contents: read
  actions: write

jobs:
  setup-ssh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create SSH user
        run: |
          echo "${{ github.event.inputs.username }}:${{ github.event.inputs.password }}" | sudo chpasswd
          echo "${{ github.event.inputs.username }} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${{ github.event.inputs.username }}

      - name: Install SSH
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${{ github.event.inputs.ts_authkey }}" --hostname gh-ssh-${{ github.run_id }}

      - name: Show SSH info
        run: |
          IP=$(tailscale ip -4 | head -n1)
          echo "SSH: ${{ github.event.inputs.username }}@$IP | Password: ${{ github.event.inputs.password }}"

      - name: Dispatch next B
        run: |
          cycles=${{ github.event.inputs.cycles }}
          if [ "$cycles" -gt 0 ]; then
            next=$((cycles-1))
            curl -X POST -H "Authorization: Bearer ${{ github.token }}" \
                 -H "Accept: application/vnd.github+json" \
                 https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/ssh-runner-B.yml/dispatches \
                 -d "{\"ref\":\"${GITHUB_REF_NAME}\",\"inputs\":{
                       \"ts_authkey\":\"${{ github.event.inputs.ts_authkey }}\",
                       \"username\":\"${{ github.event.inputs.username }}\",
                       \"password\":\"${{ github.event.inputs.password }}\",
                       \"cycles\":\"$next\"}}"
          fi

      - name: Keep alive
        run: |
          while true; do
            IP=$(tailscale ip -4 | head -n1)
            echo "[B] Heartbeat: $(date) | IP: $IP"
            sleep 60
          done
