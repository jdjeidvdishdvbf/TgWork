name: SSH Runner B

on:
  workflow_dispatch:
    inputs:
      cycles:
        required: false
        default: "9999"

permissions:
  contents: read
  actions: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      USERNAME: runner
      PASSWORD: runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          sudo apt-get update -qq
          sudo apt-get install -y openssh-server python3 python3-pip curl
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "ssh-b-${{ github.run_id }}"

      - name: Run Telegram Bot
        run: python3 .github/tg_ping_b.py &

      - name: Keep alive
        run: sleep 20000

      - name: Restart A
        if: always()
        run: |
          cycles=${{ inputs.cycles }}
          next=$((cycles-1))
          curl -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/ssh-runner-a.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"cycles\":\"$next\"}}"
