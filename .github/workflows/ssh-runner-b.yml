name: SSH Runner B

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        required: false
      username:
        required: false
        default: runner
      password:
        required: false
        default: runner
      cycles:
        required: false
        default: "9999"

permissions:
  contents: read
  actions: write

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Set environment from input or secret
        run: |
          USERNAME="${{ github.event.inputs.username }}"
          PASSWORD="${{ github.event.inputs.password }}"
          TAILSCALE_AUTHKEY="${{ github.event.inputs.ts_authkey }}"
          
          if [ -z "$TAILSCALE_AUTHKEY" ]; then
            TAILSCALE_AUTHKEY="${{ secrets.TAILSCALE_AUTHKEY }}"
          fi
          
          echo "USERNAME=$USERNAME" >> $GITHUB_ENV
          echo "PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "TAILSCALE_AUTHKEY=$TAILSCALE_AUTHKEY" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          sudo apt-get update -qq
          sudo apt-get install -y openssh-server
          sudo systemctl restart ssh

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "ssh-b-${{ github.run_id }}"

      - name: Keep alive
        run: sleep 20000

      - name: Dispatch A
        if: always()
        run: |
          cycles=${{ github.event.inputs.cycles }}
          next=$((cycles-1))
          if [ "$next" -gt 0 ]; then
            curl -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/ssh-runner-a.yml/dispatches \
              -d "{\"ref\":\"main\",\"inputs\":{
                     \"ts_authkey\":\"${TAILSCALE_AUTHKEY}\",
                     \"username\":\"${USERNAME}\",
                     \"password\":\"${PASSWORD}\",
                     \"cycles\":\"$next\"}}"
